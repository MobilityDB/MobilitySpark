name: Maven CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  pull_request:
    branches: ["main", "feat/**", "fix/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (Java 21 / Spark 3.5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install libmeos runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libjson-c5 libgeos-c1t64 libproj25 libgsl27 libh3-1

      - name: Set up libmeos.so and LD_LIBRARY_PATH
        run: |
          mkdir -p /tmp/libmeos
          cp "$GITHUB_WORKSPACE/lib/libmeos.so" /tmp/libmeos/libmeos.so
          echo "LD_LIBRARY_PATH=/tmp/libmeos" >> "$GITHUB_ENV"

      - name: Install JMEOS 1.4 to local Maven repository
        run: |
          mvn install:install-file \
            -Dfile=libs/JMEOS-1.4.jar \
            -DgroupId=org.jmeos \
            -DartifactId=jmeos \
            -Dversion=1.4 \
            -Dpackaging=jar \
            -q

      - name: License header check
        run: bash tools/scripts/check_license.sh

      - name: Compile
        run: mvn -B compile

      - name: Unit tests
        run: mvn -B test

      - name: Native crash diagnostics
        if: failure()
        run: |
          echo "===== JVM fatal error logs ====="
          find . -name 'hs_err_pid*.log' -print -exec cat {} \; 2>/dev/null || true
          echo "===== surefire dump streams ====="
          for f in $(find . -path '*/surefire-reports/*' \( -name '*.dump' -o -name '*.dumpstream' -o -name '*-jvmRun*.dump' \) 2>/dev/null); do
            echo "----- $f -----"; cat "$f" 2>/dev/null || true
          done
          echo "===== ConstructorUDFsExtTest surefire report ====="
          cat target/surefire-reports/*ConstructorUDFsExtTest*.txt 2>/dev/null || true
          echo "===== runner locale + json-c ====="
          locale 2>/dev/null || true
          dpkg -l 'libjson-c*' 2>/dev/null | tail -3 || true
          ldd lib/libmeos.so 2>/dev/null | grep -Ei 'json|geos|proj|gsl|h3|not found' || true

      - name: Package (fat jar)
        run: mvn -B package -DskipTests

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: mobilityspark-spark.jar
          path: target/*-spark.jar
