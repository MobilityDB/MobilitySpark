name: Maven CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "ci/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  pull_request:
    branches: ["main", "develop", "feat/**", "fix/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (Java 21 / Spark 3.5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install libmeos runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libjson-c5 libgeos-c1t64 libproj25 libgsl27

      - name: Extract libmeos.so and set LD_LIBRARY_PATH
        run: |
          mkdir -p /tmp/libmeos
          cd /tmp/libmeos && jar -xf "$GITHUB_WORKSPACE/libs/JMEOS-1.3.jar" lib/libmeos.so
          mv /tmp/libmeos/lib/libmeos.so /tmp/libmeos/libmeos.so
          echo "LD_LIBRARY_PATH=/tmp/libmeos" >> "$GITHUB_ENV"

      - name: License header check
        run: bash tools/scripts/check_license.sh

      - name: Compile
        run: mvn -B compile

      - name: Unit tests
        run: mvn -B test

      - name: Package (fat jar)
        run: mvn -B package -DskipTests

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: mobilityspark-spark.jar
          path: target/*-spark.jar
