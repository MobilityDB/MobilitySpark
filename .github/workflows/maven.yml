name: Maven CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "ci/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  pull_request:
    branches: ["main", "develop", "feat/**", "fix/**"]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────────
  linux:
    name: Build and test — Linux (Java 21 / Spark 3.5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install libmeos runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libjson-c5 libgeos-c1t64 libproj25 libgsl27

      - name: Extract libmeos.so and set LD_LIBRARY_PATH
        run: |
          mkdir -p /tmp/libmeos
          cd /tmp/libmeos && jar -xf "$GITHUB_WORKSPACE/libs/JMEOS-1.4.jar" lib/libmeos.so
          mv /tmp/libmeos/lib/libmeos.so /tmp/libmeos/libmeos.so
          echo "LD_LIBRARY_PATH=/tmp/libmeos" >> "$GITHUB_ENV"

      - name: License header check
        run: bash tools/scripts/check_license.sh

      - name: Compile
        run: mvn -B compile

      - name: Unit tests
        run: mvn -B test

      - name: Package (fat jar)
        run: mvn -B package -DskipTests

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: mobilityspark-spark.jar
          path: target/*-spark.jar

  # ── macOS ────────────────────────────────────────────────────────────────────
  macos:
    name: Build and test — macOS (Java 21 / Spark 3.5)
    runs-on: macos-latest
    # Non-blocking until JMEOS splits its 1683-method functions interface:
    # JNR-FFI cannot generate a proxy class for an interface that large on
    # ARM64 Java 21 (JDK proxy <clinit>()V exceeds the 64 KB bytecode limit).
    # libmeos.dylib itself loads fine (verified via Python ctypes); the failure
    # is purely in JNR-FFI's proxy generation — an upstream JMEOS issue.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install MEOS dependencies (Homebrew)
        run: |
          brew install json-c geos proj gsl cmake ninja

      - name: Checkout MobilityDB source (for MEOS build)
        uses: actions/checkout@v4
        with:
          repository: MobilityDB/MobilityDB
          ref: master
          path: MobilityDB-src

      - name: Patch MEOS for JMEOS-1.4 symbol compatibility
        run: |
          # tfloat_avg_value was renamed to tnumber_avg_value in MEOS master; add
          # a backward-compat alias so JMEOS-1.4 can bind it.
          printf '\ndouble tfloat_avg_value(const Temporal *temp) { return tnumber_avg_value(temp); }\n' \
            >> MobilityDB-src/meos/src/temporal/temporal.c
          # geog_from_binary is declared in meos_geo.h but has no standalone
          # implementation; JMEOS-1.4 declares it non-optional so a stub is needed.
          printf '\nGSERIALIZED *geog_from_binary(const char *wkb_bytea) { return (GSERIALIZED *) NULL; }\n' \
            >> MobilityDB-src/meos/src/geo/postgis_funcs.c

      - name: Build and install libmeos.dylib
        run: |
          # Homebrew on macOS-ARM installs to /opt/homebrew; on Intel to /usr/local.
          BREW_PREFIX="$(brew --prefix)"
          cmake -S MobilityDB-src -B meos-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX" \
            -DCMAKE_INSTALL_RPATH="$BREW_PREFIX/lib" \
            -DMEOS=ON \
            -DCBUFFER=ON -DNPOINT=ON -DPOSE=OFF -DRGEO=OFF
          cmake --build meos-build -j
          sudo cmake --install meos-build
          # Ad-hoc codesign so that the JVM's hardened-runtime library validation
          # accepts the unsigned CMake-built dylib.
          sudo codesign --force --sign - /usr/local/lib/libmeos.dylib
          # JarLibraryLoader reads LD_LIBRARY_PATH first in CI mode (GITHUB_WORKFLOW
          # set), then falls back to DYLD_LIBRARY_PATH. Set both env vars so the
          # correct /usr/local/lib path reaches JNR-FFI regardless of which one
          # the JVM process sees after the hardened runtime strips DYLD_* vars.
          echo "LD_LIBRARY_PATH=/usr/local/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=/usr/local/lib:$BREW_PREFIX/lib" >> "$GITHUB_ENV"

      - name: Compile
        run: mvn -B compile

      - name: JVM and library load diagnostic
        if: failure()
        run: |
          echo "=== JVM entitlements ==="
          codesign -d --entitlements :- "$JAVA_HOME/bin/java" 2>/dev/null || echo "(no entitlements or codesign unavailable)"
          echo ""
          echo "=== libmeos.dylib signature ==="
          codesign -dv /usr/local/lib/libmeos.dylib 2>&1 || echo "(not signed)"
          echo ""
          echo "=== System.load test ==="
          JNR_JAR=$(find "$HOME/.m2" -name "jnr-ffi-*.jar" 2>/dev/null | grep -v sources | head -1)
          JFFI_JAR=$(find "$HOME/.m2" -name "jffi-*.jar" 2>/dev/null | grep -v native | grep -v sources | head -1)
          JFFI_NATIVE_JAR=$(find "$HOME/.m2" -name "jffi-*-native.jar" 2>/dev/null | head -1)
          ALL_JARS=$(echo "$JNR_JAR:$JFFI_JAR:$JFFI_NATIVE_JAR" | tr -s ':')
          echo "JNR-FFI jars: $ALL_JARS"
          java -cp "$ALL_JARS" -XshowSettings:all -version 2>&1 | grep -i "os\|arch" || true
          # JNR-FFI uses RTLD_NOW|RTLD_GLOBAL (flags=10); ctypes uses RTLD_GLOBAL.
          # Test each dlopen mode to isolate whether RTLD_NOW causes the failure.
          # Python code is emitted via printf to avoid YAML block-scalar column-0 issues.
          printf '%s\n' 'import ctypes' 'RTLD_NOW=2; RTLD_LOCAL=4; RTLD_GLOBAL=8' "lib='/usr/local/lib/libmeos.dylib'" "for label, mode in [('RTLD_LAZY|RTLD_GLOBAL (ctypes default)', RTLD_GLOBAL), ('RTLD_LAZY|RTLD_LOCAL', RTLD_LOCAL), ('RTLD_NOW|RTLD_GLOBAL  (JNR-FFI mode)', RTLD_NOW|RTLD_GLOBAL), ('RTLD_NOW|RTLD_LOCAL', RTLD_NOW|RTLD_LOCAL)]:" "    try: ctypes.CDLL(lib, mode=mode); print('  OK:  ' + label)" "    except OSError as e: print('  FAIL: ' + label + ': ' + str(e))" | python3
          echo "=== undefined symbols in libmeos.dylib ==="
          nm -u /usr/local/lib/libmeos.dylib | head -20

      - name: Unit tests
        # jnr.ffi.asm.enabled=false: JNR-FFI normally generates a JDK dynamic
        # proxy via ASM bytecode; the generated <clinit>()V for the ~1683-method
        # JMEOS functions interface exceeds the JVM 64 KB method limit on
        # macOS ARM64 (Apple Silicon) with Java 21, causing MethodTooLargeException.
        # Disabling ASM switches JNR-FFI to reflection mode and avoids the limit.
        # MAVEN_OPTS reaches the Maven JVM itself (not a forked child), which is
        # where the proxy is generated when forkCount=0.
        env:
          MAVEN_OPTS: "-Djnr.ffi.asm.enabled=false"
        run: mvn -B test -Dsurefire.forkCount=0

      - name: Package (fat jar)
        run: mvn -B package -DskipTests

  # ── Windows ──────────────────────────────────────────────────────────────────
  windows:
    name: Build and test — Windows (Java 21 / Spark 3.5)
    runs-on: windows-latest
    # Non-blocking until end-to-end Windows CI has been validated green.
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-json-c
            mingw-w64-ucrt-x86_64-geos
            mingw-w64-ucrt-x86_64-proj
            mingw-w64-ucrt-x86_64-gsl
            mingw-w64-ucrt-x86_64-tzdata

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Checkout MobilityDB source (for MEOS build)
        # Use the meos-windows-bootstrap branch which adds -DMEOS_TZDATA_DIR
        # cmake support (MobilityDB issue #513).  Revert to ref: master once
        # that branch merges upstream.
        uses: actions/checkout@v4
        with:
          repository: estebanzimanyi/MobilityDB
          ref: meos-windows-bootstrap
          path: MobilityDB-src

      - name: Resolve native timezone data path
        run: |
          # cygpath -m converts the MSYS2 POSIX prefix to a Windows-native path
          # (e.g. C:/msys64/ucrt64/share/zoneinfo) that fopen() inside the DLL
          # can open at runtime.
          TZDATA_WIN=$(cygpath -m "$MSYSTEM_PREFIX/share/zoneinfo")
          echo "MEOS_TZDATA_WIN=$TZDATA_WIN" >> "$GITHUB_ENV"

      - name: Build and install libmeos.dll
        run: |
          cmake -S MobilityDB-src -B meos-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMEOS=ON \
            -DCBUFFER=ON -DNPOINT=ON -DPOSE=OFF -DRGEO=OFF \
            -DMEOS_TZDATA_DIR="$MEOS_TZDATA_WIN"
          cmake --build meos-build -j
          cmake --install meos-build --prefix "$PWD/meos-install"
          echo "PATH=$PWD/meos-install/bin:$PWD/meos-build:$PATH" >> "$GITHUB_ENV"

      - name: Compile
        shell: pwsh
        run: mvn -B compile

      - name: Unit tests
        shell: pwsh
        run: mvn -B test
